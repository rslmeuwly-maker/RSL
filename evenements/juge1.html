<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Résultats — Montreux 2026 — 2 runs — BT départage</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--red:#d71920;--panel:#18181b;--panel2:#232326;--text:#f5f5f5;--muted:#b8b8bd;--line:rgba(255,255,255,.10);--green:#29c66f;--gold:#f6c90e;--silver:#c0c0c0;--bronze:#cd7f32;--j1:#3b82f6;--j2:#a855f7;--j3:#f97316}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,rgba(215,25,32,.12),transparent 34%),linear-gradient(180deg,#111,#0d0d0f 55%,#111);color:var(--text);min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.4);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;gap:12px;flex-wrap:wrap}
    .topbar h1{font-size:1rem;text-transform:uppercase;letter-spacing:.04em}
    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .seg{display:flex;background:var(--panel2);border-radius:12px;overflow:hidden;border:1px solid var(--line)}
    .seg button{border:none;padding:8px 18px;font:inherit;font-size:.85rem;font-weight:700;cursor:pointer;color:var(--muted);background:transparent;transition:.15s}
    .seg button.active{background:var(--red);color:#fff}
    .btn-sm{border:none;border-radius:10px;padding:7px 14px;background:rgba(255,255,255,.08);color:var(--muted);font-size:.82rem;font-weight:700;cursor:pointer;transition:.15s}
    .btn-sm:hover{background:rgba(255,255,255,.13);color:#fff}
    .wrap{padding:18px 22px;max-width:1500px;margin:auto}
    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;font-size:.82rem;color:var(--muted);line-height:1.45}
    .pill{display:inline-block;border-radius:999px;padding:4px 10px;background:rgba(255,255,255,.07);border:1px solid var(--line);font-weight:800;color:#fff}
    .cat-block{margin-bottom:24px;border:1px solid var(--line);border-radius:22px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01));box-shadow:0 14px 40px rgba(0,0,0,.24)}
    .cat-header{display:flex;align-items:center;gap:10px;padding:13px 18px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--line);flex-wrap:wrap}
    .cat-label{background:var(--red);color:#fff;border-radius:999px;padding:4px 14px;font-weight:900;font-size:.85rem;text-transform:uppercase}
    .cat-sex{background:rgba(255,255,255,.07);color:var(--muted);border-radius:999px;padding:4px 12px;font-weight:700;font-size:.82rem}
    .cat-count{color:var(--muted);font-size:.82rem;margin-left:auto}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:1180px}
    thead th{padding:9px 10px;text-align:center;text-transform:uppercase;font-size:.65rem;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--line);white-space:nowrap;background:rgba(0,0,0,.12)}
    thead th.left{text-align:left}
    tbody tr{border-bottom:1px solid rgba(255,255,255,.04)}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:rgba(255,255,255,.02)}
    td{padding:10px;vertical-align:middle;text-align:center}
    td.left{text-align:left}
    .rank{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.86rem;margin:auto}
    .rank-1{background:var(--gold);color:#000}.rank-2{background:var(--silver);color:#000}.rank-3{background:var(--bronze);color:#fff}.rank-n{background:rgba(255,255,255,.07);color:var(--muted)}
    .rider-name{font-weight:800;font-size:.92rem}.rider-sub{color:var(--muted);font-size:.75rem;margin-top:2px}
    .runbox{display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;min-width:78px}
    .runlabel{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800}
    .runscore{font-size:1.02rem;font-weight:900;color:#fff}.runscore.best{color:var(--gold)}.runscore.dim{color:var(--muted);font-size:.82rem;font-weight:600}
    .judges{font-size:.72rem;color:var(--muted);white-space:nowrap}.judges.ok{color:var(--green)}
    .final-score{font-size:1.35rem;font-weight:900}.final-score.has{color:var(--gold)}.final-score.dim{color:var(--muted);font-size:.9rem}
    .besttag{display:inline-block;margin-top:3px;border-radius:999px;background:rgba(246,201,14,.12);color:var(--gold);border:1px solid rgba(246,201,14,.22);padding:2px 8px;font-size:.68rem;font-weight:900;text-transform:uppercase}
    .pending{color:var(--muted);font-size:.78rem;font-style:italic}.empty-block{text-align:center;padding:36px;color:var(--muted)}
    .jbadge{display:inline-block;border-radius:6px;padding:2px 7px;font-size:.72rem;font-weight:800}.jbadge.j1{background:rgba(59,130,246,.15);color:var(--j1)}.jbadge.j2{background:rgba(168,85,247,.15);color:var(--j2)}.jbadge.j3{background:rgba(249,115,22,.15);color:var(--j3)}
    @media(max-width:700px){.wrap{padding:10px}.topbar{padding:12px}.cat-count{margin-left:0}}
    @media print{body{background:#fff;color:#000}.topbar{position:static;background:#fff;border-bottom:1px solid #ddd}.controls{display:none}.cat-block{break-inside:avoid;border:1px solid #ccc;box-shadow:none}.legend{color:#333}.table-wrap{overflow:visible}table{min-width:0;font-size:10px}.final-score.has,.runscore.best{color:#000}.cat-label{background:#000;color:#fff}}
  </style>
</head>
<body>
<div class="topbar">
  <h1>🏆 Résultats · Montreux 2026 · 2 runs · BT départage</h1>
  <div class="controls">
    <div class="seg" id="discSeg">
      <button class="active" onclick="setDisc('Park')">Park</button>
      <button onclick="setDisc('Street')">Street</button>
    </div>
    <button class="btn-sm" onclick="loadAll()">↻ Actualiser</button>
    <button class="btn-sm" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn-sm" onclick="window.print()">🖨 Imprimer</button>
  </div>
</div>

<div class="wrap" id="mainWrap"><div class="empty-block">Chargement…</div></div>

<script>
  const SUPABASE_URL  = "https://jynxifufaauoxwzjapzq.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5bnhpZnVmYWF1b3h3emphcHpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEzODI2NzcsImV4cCI6MjA3Njk1ODY3N30.vFPGhGakPIM3Xg5rn8_BrAXl6oJMJOssO780C9nXmr4";
  const _supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const CATEGORIES = ["U13","U15","Amateur","Pro"];
  const SEXES = ["Homme","Femme"];
  const JUDGES = [1,2,3];
  let currentDisc = "Park";
  let allRiders = [];
  let allScores = [];
  let lastRenderedRows = [];

  function setDisc(d){
    currentDisc = d;
    document.querySelectorAll("#discSeg button").forEach(b => b.classList.toggle("active", b.textContent===d));
    renderAll();
  }

  async function loadAll(){
    document.getElementById("mainWrap").innerHTML = '<div class="empty-block">Chargement…</div>';
    const {data:riders,error} = await _supa.from("inscriptions").select("*").eq("paid",true).order("last_name");
    if(error){document.getElementById("mainWrap").innerHTML='<div class="empty-block">Erreur inscriptions : '+esc(error.message)+'</div>';return;}
    allRiders = riders || [];
    const {data:sc,error:scErr} = await _supa.from("scores").select("*");
    if(scErr){document.getElementById("mainWrap").innerHTML='<div class="empty-block">Erreur scores : '+esc(scErr.message)+'</div>';return;}
    allScores = sc || [];
    renderAll();
  }

  function getScore(riderId, disc, jugeNum, runNum){
    const wantedDisc = norm(disc);
    const candidates = allScores.filter(s => String(s.inscription_id)===String(riderId) && Number(s.juge)===Number(jugeNum));
    return candidates.find(s => {
      const sd = norm(s.discipline || "");
      const run = Number(s.run ?? s.run_number ?? s.run_index ?? s.heat ?? 0);
      if(sd === wantedDisc && run === runNum) return true;
      if(sd === norm(disc + " Run " + runNum)) return true;
      if(sd === norm(disc + " R" + runNum)) return true;
      if(sd === norm(disc + "_run_" + runNum)) return true;
      if(sd === norm(disc + "-run-" + runNum)) return true;
      return false;
    }) || null;
  }

  function calcJugeTotal(sc){
    if(!sc) return null;
    const vals = [sc.style, sc.technique, sc.originalite]
      .filter(v => v !== null && v !== undefined && v !== "")
      .map(Number)
      .filter(v => !isNaN(v));
    // IMPORTANT : si un juge a une ligne vide en DB, on ne compte PAS ce juge comme 0.
    // Sinon 1 juge qui met 2.00 + 2 juges vides = 0.67, ce qui est faux.
    if(!vals.length) return null;
    return vals.reduce((a,b)=>a+b,0) / vals.length;
  }

  function calcJugeBestTrick(sc){
    if(!sc) return null;
    const vals = [sc.t1, sc.t2, sc.t3]
      .filter(v => v !== null && v !== undefined && v !== "")
      .map(Number)
      .filter(v => !isNaN(v));
    if(!vals.length) return null;
    return Math.max.apply(null, vals);
  }

  function getRunScore(riderId, disc, runNum){
    const totals = JUDGES.map(j => calcJugeTotal(getScore(riderId, disc, j, runNum))).filter(v => v !== null);
    if(!totals.length) return null;
    return totals.reduce((a,b)=>a+b,0) / totals.length;
  }

  function getRunBestTrick(riderId, disc, runNum){
    const vals = JUDGES.map(j => calcJugeBestTrick(getScore(riderId, disc, j, runNum))).filter(v => v !== null);
    if(!vals.length) return null;
    return vals.reduce((a,b)=>a+b,0) / vals.length;
  }

  function getRunJudgeCount(riderId, disc, runNum){
    return JUDGES.map(j => calcJugeTotal(getScore(riderId, disc, j, runNum))).filter(v => v !== null).length;
  }

  function getFinalScore(riderId, disc){
    const r1 = getRunScore(riderId, disc, 1);
    const r2 = getRunScore(riderId, disc, 2);
    if(r1 === null && r2 === null) return null;
    return Math.max(r1 ?? -1, r2 ?? -1);
  }

  function getBestRun(riderId, disc){
    const r1 = getRunScore(riderId, disc, 1);
    const r2 = getRunScore(riderId, disc, 2);
    if(r1 === null && r2 === null) return null;
    if((r1 ?? -1) >= (r2 ?? -1)) return 1;
    return 2;
  }

  function getTieBreaker(riderId, disc){
    const bestRun = getBestRun(riderId, disc);
    if(!bestRun) return null;
    return getRunBestTrick(riderId, disc, bestRun);
  }

  function compareRiders(a,b){
    const fa = getFinalScore(a.id,currentDisc) ?? -1;
    const fb = getFinalScore(b.id,currentDisc) ?? -1;
    if(fb !== fa) return fb - fa;
    const ta = getTieBreaker(a.id,currentDisc) ?? -1;
    const tb = getTieBreaker(b.id,currentDisc) ?? -1;
    return tb - ta;
  }

  function renderAll(){
    const wrap = document.getElementById("mainWrap");
    wrap.innerHTML = "";
    lastRenderedRows = [];
    const riders = allRiders.filter(r => matchDisc(r));
    if(!riders.length){wrap.innerHTML='<div class="empty-block">Aucun rider payé pour '+esc(currentDisc)+'.</div>';return;}

    const leg = document.createElement("div");
    leg.className = "legend";
    leg.innerHTML = '<span class="pill">Classement = meilleur run</span><span>Run 1 et Run 2 sont chacun la moyenne des juges disponibles.</span><span><span class="jbadge j1">J1</span> <span class="jbadge j2">J2</span> <span class="jbadge j3">J3</span></span><span>Score juge = moyenne Style/Technique/Originalité. Best Trick visible en colonne, mais utilisé uniquement pour départager une égalité.</span>';
    wrap.appendChild(leg);

    let found = false;
    CATEGORIES.forEach(cat => {
      SEXES.forEach(sex => {
        const group = riders.filter(r => r.category===cat && normSex(r.sex)===sex);
        if(!group.length) return;
        found = true;
        const sorted = [...group].sort(compareRiders);
        const block = document.createElement("div");
        block.className = "cat-block";
        block.innerHTML = '<div class="cat-header"><span class="cat-label">'+esc(cat)+'</span><span class="cat-sex">'+esc(sex)+'</span><span class="cat-count">'+group.length+' rider'+(group.length>1?'s':'')+'</span></div><div class="table-wrap"><table><thead><tr><th style="width:40px" class="left">Pos.</th><th class="left">Rider</th><th>Run 1</th><th>BT Run 1</th><th>Run 2</th><th>BT Run 2</th><th>Meilleur run</th><th>BT départage</th><th>Score final</th></tr></thead><tbody id="tbody-'+safeId(cat)+'-'+safeId(sex)+'"></tbody></table></div>';
        wrap.appendChild(block);
        const tbody = document.getElementById('tbody-'+safeId(cat)+'-'+safeId(sex));

        sorted.forEach((r,i) => {
          const rank = i+1;
          const r1 = getRunScore(r.id,currentDisc,1);
          const r2 = getRunScore(r.id,currentDisc,2);
          const c1 = getRunJudgeCount(r.id,currentDisc,1);
          const c2 = getRunJudgeCount(r.id,currentDisc,2);
          const final = getFinalScore(r.id,currentDisc);
          const bt1 = getRunBestTrick(r.id,currentDisc,1);
          const bt2 = getRunBestTrick(r.id,currentDisc,2);
          const bestRun = getBestRun(r.id,currentDisc);
          const tieBreak = getTieBreaker(r.id,currentDisc);
          const rankClass = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'rank-n';
          lastRenderedRows.push({position:rank,category:cat,sex:sex,discipline:currentDisc,first_name:r.first_name,last_name:r.last_name,city:r.city||'',club:r.club||'',run1:r1,bt_run1:bt1,run2:r2,bt_run2:bt2,best_run:bestRun,best_trick_tiebreak:tieBreak,final:final});
          const tr = document.createElement("tr");
          tr.innerHTML = '<td class="left"><div class="rank '+rankClass+'">'+rank+'</div></td>'+
            '<td class="left"><div class="rider-name">'+esc(r.first_name)+' '+esc(r.last_name)+'</div><div class="rider-sub">'+esc(r.city||'')+(r.club?' · '+esc(r.club):'')+'</div></td>'+
            runCell(1,r1,c1,bestRun===1)+btCell(bt1)+runCell(2,r2,c2,bestRun===2)+btCell(bt2)+
            '<td>'+(bestRun?'<span class="besttag">Run '+bestRun+'</span>':'<span class="pending">—</span>')+'</td>'+
            '<td><span class="besttag">'+(tieBreak!==null?tieBreak.toFixed(2):'—')+'</span></td>'+
            '<td><span class="final-score '+(final!==null?'has':'dim')+'">'+(final!==null?final.toFixed(2):'en attente')+'</span></td>';
          tbody.appendChild(tr);
        });
      });
    });
    if(!found) wrap.innerHTML='<div class="empty-block">Aucun rider trouvé.</div>';
  }

  function btCell(score){
    return '<td><span class="besttag">'+(score !== null ? score.toFixed(2) : '—')+'</span></td>';
  }

  function runCell(run,score,count,isBest){
    const scoreTxt = score !== null ? score.toFixed(2) : '—';
    const cls = score !== null ? 'runscore '+(isBest?'best':'') : 'runscore dim';
    const judgeTxt = count ? count+'/3 juges' : 'aucun juge';
    return '<td><div class="runbox"><span class="runlabel">Run '+run+'</span><span class="'+cls+'">'+scoreTxt+'</span><span class="judges '+(count===3?'ok':'')+'">'+judgeTxt+'</span></div></td>';
  }

  function exportCSV(){
    if(!lastRenderedRows.length) return;
    const cols = ['position','category','sex','discipline','first_name','last_name','city','club','run1','bt_run1','run2','bt_run2','best_run','best_trick_tiebreak','final'];
    const lines = [cols.join(';')].concat(lastRenderedRows.map(r => cols.map(c => '"'+String(r[c] ?? '').replace(/"/g,'""')+'"').join(';')));
    const blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'resultats_'+currentDisc.toLowerCase()+'_montreux_2026_2_runs_bt_departage.csv';
    a.click();
  }

  function matchDisc(r){
    const d = norm(r.discipline || "");
    const p = norm(r.pack_type || "");
    return p.includes('pack') || !r.discipline || d===norm(currentDisc) || d.includes(norm(currentDisc));
  }
  function normSex(s){if(!s)return 'Homme';const v=String(s).toLowerCase().trim();return ['f','femme','female','féminin','feminin','girl'].includes(v)?'Femme':'Homme';}
  function norm(s){return String(s||'').toLowerCase().trim().replace(/\s+/g,' ').replace(/_/g,' ').replace(/-/g,' ');}
  function num(v){const n=Number(v);return isNaN(n)?0:n;}
  function safeId(s){return String(s).replace(/[^a-z0-9]/gi,'_');}
  function esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  loadAll();
</script>
</body>
</html>
