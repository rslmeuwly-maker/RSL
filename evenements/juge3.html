<style>
:root{--red:#d71920;--bg:#0f0f10;--panel:#18181b;--p2:#232326;--txt:#f5f5f5;--mu:#b8b8bd;--ln:rgba(255,255,255,.10);--gr:#29c66f;--go:#f6c90e;--j:#3b82f6;--r1:#2563eb;--r2:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,rgba(215,25,32,.13),transparent 34%),linear-gradient(180deg,#111,#0d0d0f 55%,#111);color:var(--txt);min-height:100vh}.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:12px 14px;border-bottom:1px solid var(--ln);background:rgba(0,0,0,.56);backdrop-filter:blur(10px)}.badge{background:var(--j);color:#fff;border-radius:999px;padding:7px 14px;font-weight:900;text-transform:uppercase}.title{font-weight:900;text-transform:uppercase;font-size:.95rem}.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.seg{display:flex;background:var(--p2);border:1px solid var(--ln);border-radius:13px;overflow:hidden}.seg button,.btn{border:0;padding:10px 15px;font-weight:900;cursor:pointer;background:transparent;color:var(--mu)}.seg button.active{background:var(--red);color:#fff}.btn{background:rgba(255,255,255,.08);border-radius:11px}.wrap{max-width:1200px;margin:auto;padding:12px}.info{margin-bottom:12px;padding:12px 14px;border:1px solid var(--ln);border-radius:16px;background:rgba(255,255,255,.035);color:var(--mu);font-size:.84rem;line-height:1.45}.info strong{color:#fff}.cb{margin-bottom:16px;border:1px solid var(--ln);border-radius:20px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01));box-shadow:0 14px 34px rgba(0,0,0,.22)}.ch{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:11px 13px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--ln)}.pill{border-radius:999px;padding:4px 12px;background:rgba(255,255,255,.08);font-weight:900;color:#fff}.pill.red{background:var(--red)}.count{margin-left:auto;color:var(--mu);font-size:.82rem}.cards{display:grid;gap:12px;padding:12px}.card{border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(0,0,0,.16);padding:12px}.rider{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}.name{font-weight:900;font-size:1rem}.sub{color:var(--mu);font-size:.78rem;margin-top:2px}.overall{text-align:right;color:var(--mu);font-size:.76rem}.overall b{display:block;color:var(--go);font-size:1.12rem}.runs{display:grid;grid-template-columns:1fr 1fr;gap:10px}.run{border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(255,255,255,.035);overflow:hidden}.rh{display:flex;justify-content:space-between;align-items:center;padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.07)}.rl{border-radius:999px;padding:4px 10px;font-size:.77rem;font-weight:900;color:#fff}.rl.r1{background:var(--r1)}.rl.r2{background:var(--r2)}.saved{color:var(--gr);font-size:.78rem;font-weight:900}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}.ig{display:flex;flex-direction:column;gap:4px}.il{font-size:.62rem;color:var(--mu);font-weight:900;text-transform:uppercase;letter-spacing:.04em}.si{width:100%;border:1px solid rgba(255,255,255,.13);border-radius:11px;background:var(--p2);color:#fff;text-align:center;font-size:1.05rem;font-weight:900;padding:10px 4px;outline:none;-moz-appearance:textfield}.si::-webkit-outer-spin-button,.si::-webkit-inner-spin-button{-webkit-appearance:none}.si:focus{border-color:var(--j)}.si.sv{border-color:rgba(41,198,111,.55)}.si.ib{border-color:var(--go);color:var(--go);background:rgba(246,201,14,.08)}.foot{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 10px 10px}.val{border-radius:12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.06);padding:8px;text-align:center;color:var(--mu);font-size:.68rem;font-weight:900;text-transform:uppercase}.val strong{display:block;margin-top:4px;font-size:1.05rem;color:#fff}.val.bt strong{color:var(--go)}.sbtn{grid-column:1/4;border:0;border-radius:13px;padding:12px;background:var(--j);color:#fff;font-weight:900;cursor:pointer;font-size:.95rem}.sbtn.ok{background:var(--gr)}.empty{padding:34px;text-align:center;color:var(--mu)}@media(max-width:760px){.top{align-items:stretch}.controls{width:100%}.seg{width:100%;display:grid;grid-template-columns:1fr 1fr}.seg button{width:100%}.btn{flex:1}.wrap{padding:10px}.runs{grid-template-columns:1fr}.grid{gap:7px}.si{font-size:1.08rem;padding:12px 3px}.count{margin-left:0}.rider{align-items:flex-start}.overall b{font-size:1rem}}@media(max-width:390px){.grid{grid-template-columns:repeat(2,1fr)}.foot{grid-template-columns:1fr 1fr}.sbtn{grid-column:1/3}.val.score{grid-column:1/3}}
</style>
</head><body>
<div class="top"><div style="display:flex;align-items:center;gap:10px"><span class="badge">Juge 3</span><span class="title">Montreux 2026</span></div><div class="controls"><div class="seg" id="seg"><button id="bPark" class="active">Park</button><button id="bStreet">Street</button></div><button class="btn" id="refresh">↻ Actualiser</button><button class="btn" onclick="window.print()">🖨 Imprimer</button></div></div>
<div class="wrap" id="wrap"><div class="empty">Chargement…</div></div>
<script>
var SB_URL="https://jynxifufaauoxwzjapzq.supabase.co";
var SB_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5bnhpZnVmYWF1b3h3emphcHpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEzODI2NzcsImV4cCI6MjA3Njk1ODY3N30.vFPGhGakPIM3Xg5rn8_BrAXl6oJMJOssO780C9nXmr4";
var db=supabase.createClient(SB_URL,SB_ANON), JUGE=3, CATS=["U13","U15","Amateur","Pro"], SEXES=["Homme","Femme"], disc="Park", riders=[], scores={}, rawScores=[];
document.getElementById('bPark').onclick=function(){setDisc('Park')};document.getElementById('bStreet').onclick=function(){setDisc('Street')};document.getElementById('refresh').onclick=load;
function setDisc(d){disc=d;document.getElementById('bPark').classList.toggle('active',d==='Park');document.getElementById('bStreet').classList.toggle('active',d==='Street');render()}
async function load(){document.getElementById('wrap').innerHTML='<div class="empty">Chargement…</div>';let r=await db.from('inscriptions').select('*').order('last_name');if(r.error){err('Erreur inscriptions : '+r.error.message);return}riders=r.data||[];let s=await db.from('scores').select('*').eq('juge',JUGE);if(s.error){err('Erreur scores : '+s.error.message);return}rawScores=s.data||[];scores={};rawScores.forEach(row=>{let x=scoreDiscRun(row);scores[key(row.inscription_id,x.d,x.run)]=row});render()}
function render(){let w=document.getElementById('wrap');w.innerHTML='<div class="info"><strong>Logique :</strong> 2 runs par rider. Score du run = moyenne Style / Technique / Originalité. <strong>BT 1/2/3 = départage uniquement</strong>, pas additionné. Cette page affiche les mêmes riders que la page résultats.</div>';let pool=riders.filter(matchDisc);if(!pool.length){w.insertAdjacentHTML('beforeend','<div class="empty">Aucun rider pour '+esc(disc)+' — inscriptions lues : '+riders.length+'</div>');return}let found=false;CATS.forEach(cat=>SEXES.forEach(sx=>{let group=pool.filter(r=>r.category===cat&&sex(r.sex)===sx);if(!group.length)return;found=true;group.sort(cmp);let b=document.createElement('div');b.className='cb';b.innerHTML='<div class="ch"><span class="pill red">'+esc(cat)+'</span><span class="pill">'+esc(sx)+'</span><span class="count">'+group.length+' rider'+(group.length>1?'s':'')+'</span></div><div class="cards"></div>';w.appendChild(b);let c=b.querySelector('.cards');group.forEach(r=>c.appendChild(card(r,cat,sx)))}));if(!found)w.insertAdjacentHTML('beforeend','<div class="empty">Aucun groupe trouvé.</div>')}
function card(r,cat,sx){let div=document.createElement('div');div.className='card';let br=bestRun(r.id), fin=finalScore(r.id);div.innerHTML='<div class="rider"><div><div class="name">'+esc(r.first_name)+' '+esc(r.last_name)+'</div><div class="sub">'+esc(r.city||'')+(r.club?' · '+esc(r.club):'')+(r.paid===true||r.paid==='true'||r.paid===1?' · payé':' · non marqué payé')+'</div></div><div class="overall">Meilleur run<b>'+(fin!==null?fmt(fin):'—')+'</b>'+(br?'Run '+br:'')+'</div></div><div class="runs">'+runHtml(r,1,cat,sx)+runHtml(r,2,cat,sx)+'</div>';return div}
function runHtml(r,run,cat,sx){let s=getScore(r.id,run)||{}, saved=!!getScore(r.id,run), av=avg(r.id,run), bt=bestT(r.id,run);let vals=[val(s.t1),val(s.t2),val(s.t3)], mx=Math.max(vals[0]||0,vals[1]||0,vals[2]||0);function inp(f,v,isbt){let best=isbt&&v!==null&&v===mx&&mx>0;return '<div class="ig"><span class="il">'+lab(f)+'</span><input class="si '+(saved?'sv ':'')+(best?'ib':'')+'" inputmode="decimal" type="number" min="0" max="10" step="0.1" id="'+f+'_r'+run+'_'+r.id+'" value="'+(v!==null?v:'')+'" data-rid="'+r.id+'" data-run="'+run+'" data-cat="'+esc(cat)+'" data-sex="'+esc(sx)+'" oninput="upd(this)"></div>'}return '<div class="run"><div class="rh"><span class="rl r'+run+'">Run '+run+'</span><span class="saved" id="saved_r'+run+'_'+r.id+'">'+(saved?'✓ Sauvé':'')+'</span></div><div class="grid">'+inp('style',val(s.style),false)+inp('technique',val(s.technique),false)+inp('originalite',val(s.originalite),false)+inp('t1',vals[0],true)+inp('t2',vals[1],true)+inp('t3',vals[2],true)+'</div><div class="foot"><div class="val">Moyenne<strong id="av_r'+run+'_'+r.id+'">'+(av!==null?fmt(av):'—')+'</strong></div><div class="val bt">BT départage<strong id="bt_r'+run+'_'+r.id+'">'+(bt!==null?fmt(bt):'—')+'</strong></div><div class="val score">Score<strong id="tt_r'+run+'_'+r.id+'">'+(av!==null?fmt(av):'—')+'</strong></div><button class="sbtn '+(saved?'ok':'')+'" id="sb_r'+run+'_'+r.id+'" data-rid="'+r.id+'" data-run="'+run+'" data-cat="'+esc(cat)+'" data-sex="'+esc(sx)+'" onclick="saveRun(this)">'+(saved?'✓ Sauvé':'Sauver Run '+run)+'</button></div></div>'}
function getScore(id,run){return scores[key(id,disc,run)]||null}function key(id,d,run){return String(id)+'_'+cap(d)+'_R'+run}
function upd(el){let id=el.dataset.rid, run=Number(el.dataset.run);let st=gv(id,run,'style'),te=gv(id,run,'technique'),or=gv(id,run,'originalite'),t1=gv(id,run,'t1'),t2=gv(id,run,'t2'),t3=gv(id,run,'t3');let a=mean([st,te,or]),bt=maxOrNull([t1,t2,t3]);['t1','t2','t3'].forEach(k=>{let e=document.getElementById(k+'_r'+run+'_'+id),v=gv(id,run,k);if(e)e.classList.toggle('ib',bt!==null&&v===bt)});txt('av_r'+run+'_'+id,a!==null?fmt(a):'—');txt('tt_r'+run+'_'+id,a!==null?fmt(a):'—');txt('bt_r'+run+'_'+id,bt!==null?fmt(bt):'—');let b=document.getElementById('sb_r'+run+'_'+id);if(b){b.textContent='Sauver Run '+run;b.className='sbtn'}txt('saved_r'+run+'_'+id,'')}
async function saveRun(btn){let id=btn.dataset.rid, run=Number(btn.dataset.run), cat=btn.dataset.cat, sx=btn.dataset.sex;let payload={inscription_id:id,discipline:disc,juge:JUGE,run:run,style:gv(id,run,'style'),technique:gv(id,run,'technique'),originalite:gv(id,run,'originalite'),t1:gv(id,run,'t1'),t2:gv(id,run,'t2'),t3:gv(id,run,'t3')};btn.disabled=true;btn.textContent='…';let res=await savePayload(payload);if(res.error){alert('Erreur Supabase : '+res.error.message);btn.disabled=false;btn.textContent='Sauver Run '+run;return}scores[key(id,disc,run)]=payload;btn.disabled=false;btn.textContent='✓ Sauvé';btn.className='sbtn ok';txt('saved_r'+run+'_'+id,'✓ Sauvé');['style','technique','originalite','t1','t2','t3'].forEach(k=>{let e=document.getElementById(k+'_r'+run+'_'+id);if(e)e.classList.add('sv')});render()}
async function savePayload(p){let q=await db.from('scores').select('id').eq('inscription_id',p.inscription_id).eq('discipline',p.discipline).eq('juge',p.juge).eq('run',p.run).limit(1);if(q.error)return q;if(q.data&&q.data.length){return await db.from('scores').update({style:p.style,technique:p.technique,originalite:p.originalite,t1:p.t1,t2:p.t2,t3:p.t3}).eq('id',q.data[0].id)}return await db.from('scores').insert([p])}
function scoreDiscRun(row){let sd=norm(row.discipline),rn=Number(row.run??row.run_number??row.run_no??row.run_index??0),m=sd.match(/^(park|street)\s*(run|r)\s*([12])$/);if(m)return{d:cap(m[1]),run:Number(m[3])};if(sd==='park'||sd==='street')return{d:cap(sd),run:rn===2?2:1};m=sd.match(/^(park|street).*([12])$/);if(m)return{d:cap(m[1]),run:Number(m[2])};return{d:cap(sd),run:rn===2?2:1}}
function avg(id,run){let s=getScore(id,run);return s?mean([val(s.style),val(s.technique),val(s.originalite)]):null}function bestT(id,run){let s=getScore(id,run);return s?maxOrNull([val(s.t1),val(s.t2),val(s.t3)]):null}function finalScore(id){let a=avg(id,1),b=avg(id,2);if(a===null&&b===null)return null;return Math.max(a??-1,b??-1)}function bestRun(id){let a=avg(id,1),b=avg(id,2);if(a===null&&b===null)return null;return (a??-1)>=(b??-1)?1:2}function tie(id){return maxOrNull([bestT(id,1),bestT(id,2)])??-1}function cmp(a,b){let fa=finalScore(a.id)??-1,fb=finalScore(b.id)??-1;if(fb!==fa)return fb-fa;return tie(b.id)-tie(a.id)}
function matchDisc(r){let d=norm(r.discipline),p=norm(r.pack_type);return p.includes('pack')||!r.discipline||d===norm(disc)||d.includes(norm(disc))}function sex(x){let v=norm(x);return ['f','femme','female','féminin','feminin','girl'].includes(v)?'Femme':'Homme'}function gv(id,run,f){let e=document.getElementById(f+'_r'+run+'_'+id),n=e?Number(e.value):NaN;return isNaN(n)||e.value===''?null:Math.min(10,Math.max(0,n))}function val(v){let n=Number(v);return v===null||v===undefined||v===''||isNaN(n)?null:n}function mean(a){let v=a.filter(x=>x!==null);return v.length?v.reduce((s,x)=>s+x,0)/v.length:null}function maxOrNull(a){let v=a.filter(x=>x!==null);return v.length?Math.max(...v):null}function lab(f){return {style:'Style',technique:'Tech.',originalite:'Orig.',t1:'BT 1',t2:'BT 2',t3:'BT 3'}[f]||f}function fmt(v){return Number(v).toFixed(2)}function cap(s){s=String(s||'').toLowerCase();return s==='street'?'Street':'Park'}function norm(s){return String(s||'').toLowerCase().trim().replace(/[_-]+/g,' ').replace(/\s+/g,' ')}function txt(id,v){let e=document.getElementById(id);if(e)e.textContent=v}function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function err(t){document.getElementById('wrap').innerHTML='<div class="empty" style="color:#ff8a8a">'+esc(t)+'</div>'}
load();
</script></body></html>
