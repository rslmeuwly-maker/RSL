<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Résultats — Montreux 2026 — Final Fix</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
:root{--red:#d71920;--p:#18181b;--p2:#232326;--txt:#f5f5f5;--mu:#b8b8bd;--ln:rgba(255,255,255,.10);--go:#f6c90e;--gr:#29c66f;--si:#c0c0c0;--br:#cd7f32}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,rgba(215,25,32,.13),transparent 34%),linear-gradient(180deg,#111,#0d0d0f 55%,#111);color:var(--txt);min-height:100vh}.top{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 14px;border-bottom:1px solid var(--ln);background:rgba(0,0,0,.56);backdrop-filter:blur(10px)}h1{font-size:.98rem;text-transform:uppercase}.ctrl{display:flex;gap:8px;flex-wrap:wrap}.seg{display:flex;background:var(--p2);border:1px solid var(--ln);border-radius:13px;overflow:hidden}.seg button,.btn{border:0;padding:10px 15px;font-weight:900;cursor:pointer;background:transparent;color:var(--mu)}.seg button.active{background:var(--red);color:#fff}.btn{background:rgba(255,255,255,.08);border-radius:11px}.wrap{max-width:1300px;margin:auto;padding:12px}.info{margin-bottom:12px;padding:12px 14px;border:1px solid var(--ln);border-radius:16px;background:rgba(255,255,255,.035);color:var(--mu);font-size:.84rem;line-height:1.45}.info strong{color:#fff}.cat{margin-bottom:16px;border:1px solid var(--ln);border-radius:20px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01));box-shadow:0 14px 34px rgba(0,0,0,.22)}.head{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:11px 13px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--ln)}.pill{border-radius:999px;padding:4px 12px;background:rgba(255,255,255,.08);font-weight:900;color:#fff}.pill.red{background:var(--red)}.count{margin-left:auto;color:var(--mu);font-size:.82rem}.cards{display:grid;gap:10px;padding:12px}.row{display:grid;grid-template-columns:42px 1.3fr repeat(6,.75fr);gap:8px;align-items:stretch;padding:10px;border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(0,0,0,.14)}.rank{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;margin:auto}.r1{background:var(--go);color:#000}.r2{background:var(--si);color:#000}.r3{background:var(--br);color:#fff}.rn{background:rgba(255,255,255,.08);color:var(--mu)}.name{align-self:center}.name b{font-size:.95rem}.sub{font-size:.75rem;color:var(--mu);margin-top:2px}.box{border-radius:12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.06);padding:8px;text-align:center}.lab{display:block;text-transform:uppercase;letter-spacing:.06em;font-size:.62rem;color:var(--mu);font-weight:900;margin-bottom:4px}.val{font-size:1.02rem;font-weight:900}.gold{color:var(--go)}.bt{color:var(--go)}.small{display:block;margin-top:3px;font-size:.68rem;color:var(--mu)}.empty{padding:34px;text-align:center;color:var(--mu)}@media(max-width:980px){.row{grid-template-columns:38px 1fr 1fr;grid-template-areas:'rank name name' 'run1 run1bt final' 'run2 run2bt best' 'judges judges judges'}.rankwrap{grid-area:rank}.name{grid-area:name}.run1{grid-area:run1}.run1bt{grid-area:run1bt}.run2{grid-area:run2}.run2bt{grid-area:run2bt}.best{grid-area:best}.final{grid-area:final}.judges{grid-area:judges}.count{margin-left:0}.top{align-items:stretch}.ctrl{width:100%}.seg{width:100%;display:grid;grid-template-columns:1fr 1fr}.seg button{width:100%}.btn{flex:1}.wrap{padding:10px}}@media(max-width:420px){.row{grid-template-columns:34px 1fr 1fr;gap:7px}.box{padding:7px 5px}.lab{font-size:.58rem}.val{font-size:1rem}}@media print{body{background:#fff;color:#000}.top{position:static;background:#fff}.ctrl{display:none}.info,.cat,.row,.box{border-color:#ccc;background:#fff;box-shadow:none}.sub,.small,.lab{color:#333}.pill.red{background:#000;color:#fff}.gold,.bt{color:#000}.cat{break-inside:avoid}}
</style></head><body><div class="top"><h1>🏆 Résultats · Montreux 2026</h1><div class="ctrl"><div class="seg"><button id="bPark" class="active">Park</button><button id="bStreet">Street</button></div><button class="btn" onclick="loadAll()">↻ Actualiser</button><button class="btn" onclick="exportCSV()">⬇ CSV</button><button class="btn" onclick="window.print()">🖨 Imprimer</button></div></div><div class="wrap" id="main"><div class="empty">Chargement…</div></div><script>
const URLS="https://jynxifufaauoxwzjapzq.supabase.co", ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5bnhpZnVmYWF1b3h3emphcHpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEzODI2NzcsImV4cCI6MjA3Njk1ODY3N30.vFPGhGakPIM3Xg5rn8_BrAXl6oJMJOssO780C9nXmr4";const db=supabase.createClient(URLS,ANON),CATS=["U13","U15","Amateur","Pro"],SEXES=["Homme","Femme"],J=[1,2,3];let disc='Park',riders=[],scores=[],rendered=[];document.getElementById('bPark').onclick=()=>setDisc('Park');document.getElementById('bStreet').onclick=()=>setDisc('Street');function setDisc(d){disc=d;document.getElementById('bPark').classList.toggle('active',d==='Park');document.getElementById('bStreet').classList.toggle('active',d==='Street');render()}
async function loadAll(){main.innerHTML='<div class="empty">Chargement…</div>';let r=await db.from('inscriptions').select('*').order('last_name');if(r.error){err('Erreur inscriptions : '+r.error.message);return}riders=r.data||[];let s=await db.from('scores').select('*');if(s.error){err('Erreur scores : '+s.error.message);return}scores=s.data||[];render()}
function render(){main.innerHTML='';rendered=[];let pool=riders.filter(matchDisc);let inf=document.createElement('div');inf.className='info';inf.innerHTML='<strong>Fix cohérence :</strong> cette page lit les mêmes riders que les pages juges, pas seulement paid=true. Score final = meilleur Run 1/Run 2. Chaque run = moyenne des juges qui ont noté. <strong>BT visible, mais départage seulement</strong>.<br>Inscriptions lues : <strong>'+riders.length+'</strong> · Scores lus : <strong>'+scores.length+'</strong> · Discipline : <strong>'+esc(disc)+'</strong>';main.appendChild(inf);if(!pool.length){main.insertAdjacentHTML('beforeend','<div class="empty">Aucun rider pour '+esc(disc)+'.</div>');return}let found=false;CATS.forEach(cat=>SEXES.forEach(sx=>{let g=pool.filter(r=>r.category===cat&&sex(r.sex)===sx);if(!g.length)return;found=true;g.sort(cmp);let b=document.createElement('div');b.className='cat';b.innerHTML='<div class="head"><span class="pill red">'+esc(cat)+'</span><span class="pill">'+esc(sx)+'</span><span class="count">'+g.length+' rider'+(g.length>1?'s':'')+'</span></div><div class="cards"></div>';main.appendChild(b);let c=b.querySelector('.cards');g.forEach((r,i)=>c.appendChild(card(r,i+1,cat,sx)))}));if(!found)main.insertAdjacentHTML('beforeend','<div class="empty">Aucun groupe trouvé.</div>')}
function card(r,pos,cat,sx){let r1=runScore(r.id,1),r2=runScore(r.id,2),bt1=runBT(r.id,1),bt2=runBT(r.id,2),br=bestRun(r.id),fin=finalScore(r.id),tbt=tieBT(r.id),c1=judgeCount(r.id,1),c2=judgeCount(r.id,2);rendered.push({position:pos,category:cat,sex:sx,discipline:disc,first_name:r.first_name,last_name:r.last_name,paid:r.paid,run1:r1,bt_run1:bt1,run2:r2,bt_run2:bt2,best_run:br,bt_departage:tbt,final:fin});let d=document.createElement('div');d.className='row';let rc=pos===1?'r1':pos===2?'r2':pos===3?'r3':'rn';d.innerHTML='<div class="rankwrap"><div class="rank '+rc+'">'+pos+'</div></div><div class="name"><b>'+esc(r.first_name)+' '+esc(r.last_name)+'</b><div class="sub">'+esc(r.city||'')+(r.club?' · '+esc(r.club):'')+(r.paid===true||r.paid==='true'||r.paid===1?' · payé':' · non marqué payé')+'</div></div>'+box('Run 1',fmt(r1),c1+'/3 juges','run1',br===1,false)+box('BT Run 1',fmt(bt1),'départage','run1bt',false,true)+box('Run 2',fmt(r2),c2+'/3 juges','run2',br===2,false)+box('BT Run 2',fmt(bt2),'départage','run2bt',false,true)+box('Meilleur',br?'Run '+br:'—',tbt!==null?'BT '+fmt(tbt):'BT —','best',false,true)+box('Final',fmt(fin),fin===null?'en attente':'score','final',true,false);return d}
function box(l,v,s,cls,gold,bt){return '<div class="box '+cls+'"><span class="lab">'+l+'</span><span class="val '+(gold?'gold':'')+' '+(bt?'bt':'')+'">'+v+'</span><span class="small">'+s+'</span></div>'}
function findScore(id,j,run){let list=scores.filter(s=>String(s.inscription_id)===String(id)&&Number(s.juge)===Number(j));let good=list.filter(s=>{let x=scoreDiscRun(s);return x.d===disc&&x.run===run});if(!good.length)return null;good.sort((a,b)=>String(b.updated_at||b.created_at||b.id||'').localeCompare(String(a.updated_at||a.created_at||a.id||'')));return good[0]}
function judgeScore(sc){if(!sc)return null;return mean([val(sc.style),val(sc.technique),val(sc.originalite)])}function judgeBT(sc){if(!sc)return null;return maxOrNull([val(sc.t1),val(sc.t2),val(sc.t3)])}function runScore(id,run){return mean(J.map(j=>judgeScore(findScore(id,j,run))).filter(v=>v!==null))}function runBT(id,run){return mean(J.map(j=>judgeBT(findScore(id,j,run))).filter(v=>v!==null))}function judgeCount(id,run){return J.map(j=>judgeScore(findScore(id,j,run))).filter(v=>v!==null).length}function bestRun(id){let a=runScore(id,1),b=runScore(id,2);if(a===null&&b===null)return null;return (a??-1)>=(b??-1)?1:2}function finalScore(id){let br=bestRun(id);return br?runScore(id,br):null}function tieBT(id){let br=bestRun(id);return br?runBT(id,br):null}function cmp(a,b){let fa=finalScore(a.id)??-1,fb=finalScore(b.id)??-1;if(fb!==fa)return fb-fa;let ta=tieBT(a.id)??-1,tb=tieBT(b.id)??-1;return tb-ta}
function scoreDiscRun(row){let sd=norm(row.discipline),rn=Number(row.run??row.run_number??row.run_no??row.run_index??0),m=sd.match(/^(park|street)\s*(run|r)\s*([12])$/);if(m)return{d:cap(m[1]),run:Number(m[3])};if(sd==='park'||sd==='street')return{d:cap(sd),run:rn===2?2:1};m=sd.match(/^(park|street).*([12])$/);if(m)return{d:cap(m[1]),run:Number(m[2])};return{d:cap(sd),run:rn===2?2:1}}
function matchDisc(r){let d=norm(r.discipline),p=norm(r.pack_type);return p.includes('pack')||!r.discipline||d===norm(disc)||d.includes(norm(disc))}function sex(x){let v=norm(x);return ['f','femme','female','féminin','feminin','girl'].includes(v)?'Femme':'Homme'}function val(v){let n=Number(v);return v===null||v===undefined||v===''||isNaN(n)?null:n}function mean(a){let v=a.filter(x=>x!==null&&x!==undefined);return v.length?v.reduce((s,x)=>s+x,0)/v.length:null}function maxOrNull(a){let v=a.filter(x=>x!==null&&x!==undefined);return v.length?Math.max(...v):null}function fmt(v){return v===null||v===undefined?'—':Number(v).toFixed(2)}function cap(s){s=String(s||'').toLowerCase();return s==='street'?'Street':'Park'}function norm(s){return String(s||'').toLowerCase().trim().replace(/[_-]+/g,' ').replace(/\s+/g,' ')}function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function err(t){main.innerHTML='<div class="empty" style="color:#ff8a8a">'+esc(t)+'</div>'}
function exportCSV(){if(!rendered.length)return;let cols=['position','category','sex','discipline','first_name','last_name','paid','run1','bt_run1','run2','bt_run2','best_run','bt_departage','final'];let lines=[cols.join(';')].concat(rendered.map(r=>cols.map(c=>'"'+String(r[c]??'').replace(/"/g,'""')+'"').join(';')));let blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='resultats_'+disc.toLowerCase()+'_montreux_2026_final_fix.csv';a.click()}
loadAll();
</script></body></html>
